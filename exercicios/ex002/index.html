<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>Você pode escrever
        um parágrafo de qualquer jeito.
        Basta colocar tudo
        no meio de tags &lt;p&gt; e &lt;/p&gt;  <!--LESS THAN / GREATHER THAN-->
    </p>
    <p>Se precisar quebrar
        o texto em algum lugar
        específico, <br> use a tag br
    </p>
    <p>Sempre para colocar simbolos especiais, será &- - -;</p>  <!--Dentro dessa tag colocar o código para aparecer o simbolo especial!-->
    <p>Vamos colocar emojis:
        &#x2B50    <!--para colocar emojis sempre colocar &#x antes do código do emoji-->
    </p>
</body>
</html>
