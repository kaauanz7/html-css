<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente redimensionando a janela do navegador.</p>
   <picture>
    <source media="(max-width: 750px )" srcset="Imagens/foto-p.png" type="image/png">
    <source media="(max-width: 1050px )" srcset="Imagens/foto-m.png" type="image/png">
    <img src="Imagens/foto-g.png" alt="Imagem Flexível">
   </picture> 
   <h1>Reproduzindo Áudio</h1>
   <p>Vamos Aprender a reproduzir áudio em HTML5.</p>
   <audio src="midia/Willow-Gozilla-feat-Rusty-James.mp3" controls autoplay></audio>
   <!-- MP3 WAV OGG -->
    <p>Temos um jeito melhor de reproduzir áudio em HTML5.</p>
    <audio preload="metadata" autoplay controls> 
    <source src="midia/Willow-Gozilla-feat-Rusty-James.mp3" type="audio/mpeg">
    <source src="midia/Willow-Gozilla-feat-Rusty-James.ogg" type="audio/ogg">
     <p>Seu navegador não suporta o elemento de áudio.</p>
     <a href="midia/Willow-Gozilla-feat-Rusty-James.mp3" download>Baixar áudio</a>
      </audio>  
</body>
</html>
