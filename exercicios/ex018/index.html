<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap");

        @import url("https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Kablammo&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap");

        body {
            font: normal 400 1em 'DynaPuff', sans-serif;
        }
        h1 {
            font: normal 400 2em 'DynaPuff', serif;
            color: blueviolet;
        }
        p {
            font: normal 400 1em 'Work Sans', serif;
            color: rgb(0, 0, 0);
        }  
    </style>
</head>
<body>
    <h1>Título 1</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Consequatur illo numquam nisi itaque placeat nihil natus et vel ducimus dolore voluptas, totam quia optio at voluptatem dolorum error repellat eaque.</p>
    
</body>
</html>
