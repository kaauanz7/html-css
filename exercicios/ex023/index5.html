<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        
        caption {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem;
            background-color: lightgray;
            border-radius: 2px 0px 2px 0px;
        }

        table {
            border-collapse: collapse;
            width: 75vw;
            margin:2rem;      
 }
        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
            background-color: lightgray;
        }
        
        tr {
            padding: 0.6rem;
        }

        col.cnome, col.cidade {
            background-color: lightblue;
        }

        col.csexo, col.cprofissao {
            background-color: rgb(48, 138, 145);
        }
    </style>
</head>
<body>
    
    <table>
        
        <colgroup>
        <col class="cnome">
        <col class="csexo">
        <col class="cidade">
        <col class="cprofissao">
        </colgroup>

        <caption>Cadastro</caption>
        
        <tr>

            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>

        <tr>

            <td>Ana Maria</td>
            <td>Feminino</td>
            <td>25</td>
            <td>Engenheira</td>
        </tr>

        <tr>
            
            <td>Claudio</td>
            <td>Masculino</td>
            <td>30</td>
            <td>Professor</td>
        </tr>

        <tr>

            <td>Carlos</td>
            <td>Masculino</td>
            <td>35</td>
            <td>Advogado</td>
        </tr>

        <tr>
            <td>Ana</td>
            <td>Feminino</td>
            <td>28</td>
            <td>Designer</td>
        </tr>
    </table>
</body>
</html>
