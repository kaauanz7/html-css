<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos</title>
</head>
<body>
    <h1>Inserindo Vídeos hospedados localmente</h1>
    <p>Este é um exemplo de como inserir vídeos hospedados localmente em uma página HTML.</p>
    <video controls width="560" height="315"  autoplay loop muted >
        <source src="midia/Videoagua(1).webm" type="video/webm">
        <source src="midia/videoagua3.ogv" type="video/ogg">
        <source src ="midia/Videoagua2.mp4" type="video/mp4">
        <source src="midia/videoagua.mp4" type="video/mp4">
        Seu navegador não suporta o elemento de vídeo.
    </video>
    <h1>Inserindo vídeos do YouTube</h1>
   <iframe width="560" height="315" src="https://www.youtube.com/embed/TVKGM7dPSrY?si=bG_YsmNSSoS10qvV" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
